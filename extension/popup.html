<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ContactHI Shield</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      width: 280px;
      background: #0f172a;
      color: #e2e8f0;
    }
    .header {
      padding: 14px 16px;
      border-bottom: 1px solid #1e293b;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 { font-size: 13px; font-weight: 600; color: #f8fafc; letter-spacing: 0.02em; }
    .header .version { font-size: 10px; color: #475569; }
    .status {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #1e293b;
    }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; flex-shrink: 0; transition: background 0.3s; }
    .status-dot.off { background: #475569; }
    .status-dot.loading { background: #f59e0b; animation: pulse 1.2s infinite; }
    .status-dot.error { background: #ef4444; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
    .status-text { font-size: 12px; color: #94a3b8; flex: 1; }
    .toggle { position: relative; width: 34px; height: 18px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; inset: 0;
      background: #334155; border-radius: 9px; cursor: pointer; transition: 0.2s;
    }
    .toggle-slider::before {
      content: ''; position: absolute;
      width: 12px; height: 12px; left: 3px; top: 3px;
      background: white; border-radius: 50%; transition: 0.2s;
    }
    input:checked + .toggle-slider { background: #3b82f6; }
    input:checked + .toggle-slider::before { transform: translateX(16px); }
    .model-bar {
      padding: 10px 16px;
      border-bottom: 1px solid #1e293b;
      display: none;
    }
    .model-bar.visible { display: block; }
    .model-bar-label {
      font-size: 10px; color: #64748b; margin-bottom: 5px;
      display: flex; justify-content: space-between;
    }
    .progress-track {
      height: 3px; background: #1e293b; border-radius: 2px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: #3b82f6; border-radius: 2px;
      transition: width 0.3s; width: 0%;
    }
    .progress-fill.indeterminate {
      width: 40%;
      animation: slide 1.2s infinite;
    }
    @keyframes slide {
      0% { margin-left: -40%; }
      100% { margin-left: 100%; }
    }
    .section { padding: 12px 16px; border-bottom: 1px solid #1e293b; }
    .section-label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #475569; margin-bottom: 8px; }
    .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
    .row-label { font-size: 12px; color: #64748b; }
    .row-value { font-size: 12px; font-weight: 500; color: #cbd5e1; }
    .chip {
      display: inline-block; padding: 1px 7px;
      background: #1e293b; border: 1px solid #334155;
      border-radius: 4px; font-size: 10px; color: #94a3b8;
    }
    .chip.on-device { border-color: #166534; background: #052e16; color: #4ade80; }
    .footer { padding: 10px 16px; display: flex; justify-content: flex-end; }
    .settings-link {
      font-size: 11px; color: #3b82f6; background: none;
      border: none; padding: 0; cursor: pointer;
    }
    .settings-link:hover { color: #60a5fa; }
  </style>
</head>
<body>
  <div class="header">
    <h1>ContactHI Shield</h1>
    <span class="version">v0.1.0</span>
  </div>
  <div class="status">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">Loading…</span>
    <label class="toggle">
      <input type="checkbox" id="enabledToggle">
      <span class="toggle-slider"></span>
    </label>
  </div>
  <div class="model-bar" id="modelBar">
    <div class="model-bar-label">
      <span id="modelLabel">Loading model…</span>
      <span id="modelPct"></span>
    </div>
    <div class="progress-track">
      <div class="progress-fill indeterminate" id="progressFill"></div>
    </div>
  </div>
  <div class="section">
    <div class="section-label">Detection</div>
    <div class="row">
      <span class="row-label">Engine</span>
      <span class="chip on-device" id="providerChip">on-device</span>
    </div>
    <div class="row">
      <span class="row-label">Action</span>
      <span class="row-value" id="actionValue">—</span>
    </div>
    <div class="row">
      <span class="row-label">Threshold</span>
      <span class="row-value" id="thresholdValue">—</span>
    </div>
  </div>
  <div class="footer">
    <button class="settings-link" id="openSettings">Settings →</button>
  </div>
  <script src="dist/popup.js"></script>
</body>
</html>
