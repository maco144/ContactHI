<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ContactHI Shield — Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 40px;
      max-width: 620px;
      margin: 0 auto;
    }
    h1 { font-size: 20px; font-weight: 700; color: #f8fafc; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #475569; margin-bottom: 32px; }
    .section { margin-bottom: 28px; }
    .section h2 {
      font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
      text-transform: uppercase; color: #475569; margin-bottom: 12px;
    }
    .field { margin-bottom: 16px; }
    label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 6px; }
    input[type="text"], select {
      width: 100%; padding: 8px 12px;
      background: #1e293b; border: 1px solid #334155;
      border-radius: 6px; color: #f8fafc; font-size: 13px; outline: none;
    }
    input[type="text"]:focus, select:focus { border-color: #3b82f6; }
    input[type="range"] { width: 100%; accent-color: #3b82f6; }
    .range-row { display: flex; align-items: center; gap: 12px; }
    .range-value { font-size: 13px; font-weight: 600; color: #f8fafc; min-width: 36px; }
    .helper { font-size: 11px; color: #475569; margin-top: 4px; }
    .provider-card {
      background: #1e293b;
      border: 1px solid #2d3f55;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .provider-card:hover { border-color: #3b82f6; }
    .provider-card.active { border-color: #3b82f6; background: #162032; }
    .provider-name { font-size: 13px; font-weight: 600; color: #f8fafc; }
    .provider-desc { font-size: 11px; color: #64748b; margin-top: 2px; }
    .provider-config { margin-top: 10px; display: none; }
    .provider-config.visible { display: block; }
    .save-btn {
      padding: 9px 22px;
      background: #3b82f6; color: white;
      border: none; border-radius: 6px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: background 0.15s;
    }
    .save-btn:hover { background: #2563eb; }
    .saved-msg {
      display: inline-block; margin-left: 12px;
      font-size: 12px; color: #22c55e;
      opacity: 0; transition: opacity 0.3s;
    }
    .saved-msg.visible { opacity: 1; }
  </style>
</head>
<body>
  <h1>ContactHI Shield</h1>
  <p class="subtitle">Configure AI detection and enforcement for your inbox and browsing.</p>

  <div class="section">
    <h2>Identity</h2>
    <div class="field">
      <label for="chiDid">Your CHI DID <span style="color:#475569">(optional — for on-chain registry in a future release)</span></label>
      <input type="text" id="chiDid" placeholder="did:chi:cosmos1…">
    </div>
  </div>

  <div class="section">
    <h2>Detection Provider</h2>
    <div id="providerList"></div>
  </div>

  <div class="section">
    <h2>Enforcement</h2>
    <div class="field">
      <label>Confidence Threshold</label>
      <div class="range-row">
        <input type="range" id="threshold" min="10" max="95" step="5" value="50">
        <span class="range-value" id="thresholdDisplay">50%</span>
      </div>
      <p class="helper">Apply action only when AI confidence exceeds this level.</p>
    </div>
    <div class="field">
      <label for="action">Action</label>
      <select id="action">
        <option value="label">Label — show a warning badge on AI content</option>
        <option value="blur">Blur — blur with click-to-reveal</option>
        <option value="hide">Hide — remove AI content from view entirely</option>
        <option value="none">None — detect only, no visual change</option>
      </select>
    </div>
  </div>

  <button class="save-btn" id="saveBtn">Save Settings</button>
  <span class="saved-msg" id="savedMsg">Saved ✓</span>

  <script src="dist/options.js"></script>
</body>
</html>
